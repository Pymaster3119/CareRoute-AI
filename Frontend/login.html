<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — CareRoute AI</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <a href="index.html" class="logo">💙 CareRoute AI</a>
  <nav class="public-nav">
    <a href="index.html">Home</a>
    <a href="signup-user.html">Sign Up</a>
  </nav>
</header>

<div class="auth-wrap">
  <div class="card">

    <div class="role-toggle">
      <a href="#" class="active" id="patientTab" onclick="showRole('patient'); return false;">I'm a Patient</a>
      <a href="#" id="doctorTab" onclick="showRole('doctor'); return false;">I'm a Doctor</a>
    </div>

    <h1 class="page-title">Welcome back</h1>
    <p class="page-subtitle">Log in to view your dashboard.</p>

    <div id="loginStatus" class="error-text" style="display:none; margin-bottom:16px;"></div>

    <!-- Patient login -> GET /verifyUser?username=&password= -->
    <form id="patientLoginForm" action="#" method="GET">
      <div class="form-group">
        <label for="pUsername">Username</label>
        <input type="text" id="pUsername" name="username" placeholder="Your username" required>
      </div>
      <div class="form-group">
        <label for="pPassword">Password</label>
        <input type="password" id="pPassword" name="password" placeholder="Your password" required>
        <div class="error-text" id="patientLoginHint">Incorrect username or password.</div>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Log In</button>
    </form>

    <!-- Doctor login -> GET /verifyDoctor?name=&password= -->
    <form id="doctorLoginForm" action="#" method="GET" style="display:none;">
      <div class="form-group">
        <label for="dName">Full name</label>
        <input type="text" id="dName" name="name" placeholder="Dr. Sarah Lee" required>
      </div>
      <div class="form-group">
        <label for="dPassword">Password</label>
        <input type="password" id="dPassword" name="password" placeholder="Your password" required>
        <div class="error-text" id="doctorLoginHint">Incorrect name or password.</div>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Log In</button>
    </form>

    <p class="auth-switch">
      Don't have an account?
      <a href="signup-user.html" id="signupLink">Sign up</a>
    </p>
  </div>
</div>

<script src="auth-state.js"></script>
<script>
  const loginStatus = document.getElementById('loginStatus');

  function showRole(role){
    const patientTab = document.getElementById('patientTab');
    const doctorTab = document.getElementById('doctorTab');
    const patientForm = document.getElementById('patientLoginForm');
    const doctorForm = document.getElementById('doctorLoginForm');
    const signupLink = document.getElementById('signupLink');

    if(role === 'patient'){
      patientTab.classList.add('active');
      doctorTab.classList.remove('active');
      patientForm.style.display = 'block';
      doctorForm.style.display = 'none';
      signupLink.setAttribute('href', 'signup-user.html');
    } else {
      doctorTab.classList.add('active');
      patientTab.classList.remove('active');
      doctorForm.style.display = 'block';
      patientForm.style.display = 'none';
      signupLink.setAttribute('href', 'signup-doctor.html');
    }
  }

  function showStatus(message) {
    loginStatus.textContent = message;
    loginStatus.style.display = 'block';
  }

  function clearStatus() {
    loginStatus.textContent = '';
    loginStatus.style.display = 'none';
  }

  function responseIndicatesSuccess(text) {
    return text.toLowerCase().includes('verified successfully');
  }

  document.getElementById('patientLoginForm').addEventListener('submit', async function (event) {
    event.preventDefault();
    clearStatus();

    const username = document.getElementById('pUsername').value;
    const password = document.getElementById('pPassword').value;

    try {
      const response = await fetch(`http://127.0.0.1:5000/verifyUser?${new URLSearchParams({ username, password })}`, {
        method: 'GET',
      });

      const responseText = await response.text();

      if (response.ok && responseIndicatesSuccess(responseText)) {
        CareRouteAuth.setAuthState('patient', username, password);
        window.location.href = 'dashboard.html';
        return;
      }

      showStatus(responseText || 'Incorrect username or password.');
    } catch (error) {
      console.error('Patient login request failed:', error);
      showStatus('Unable to reach the login service. Check that the backend is running and allows this page origin.');
    }
  });

  document.getElementById('doctorLoginForm').addEventListener('submit', async function (event) {
    event.preventDefault();
    clearStatus();

    const name = document.getElementById('dName').value;
    const password = document.getElementById('dPassword').value;

    try {
      const response = await fetch(`http://127.0.0.1:5000/verifyDoctor?${new URLSearchParams({ name, password })}`, {
        method: 'GET',
      });

      const responseText = await response.text();

      if (response.ok && responseIndicatesSuccess(responseText)) {
        CareRouteAuth.setAuthState('doctor', name, password);
        window.location.href = 'doctor-dashboard.html';
        return;
      }

      showStatus(responseText || 'Incorrect name or password.');
    } catch (error) {
      console.error('Doctor login request failed:', error);
      showStatus('Unable to reach the login service. Check that the backend is running and allows this page origin.');
    }
  });
</script>

</body>
</html>
