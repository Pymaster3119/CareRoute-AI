<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Your Account — CareRoute AI</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <a href="index.html" class="logo">💙 CareRoute AI</a>
  <nav class="public-nav">
    <a href="index.html">Home</a>
    <a href="login.html">Log In</a>
  </nav>
</header>

<div class="auth-wrap">
  <div class="card">

    <div class="role-toggle">
      <a href="signup-user.html" class="active">I'm a Patient</a>
      <a href="signup-doctor.html">I'm a Doctor</a>
    </div>

    <h1 class="page-title">Create your account</h1>
    <p class="page-subtitle">Upload your medical documents and get plain-language guidance.</p>

    <!-- Wire this form up to POST /addUser (fields: username, email, password, location) -->
    <form id="userSignupForm" action="#" method="POST">

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="e.g. jordan_m" required>
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
        <div class="error-text">Please enter a valid email address.</div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="At least 8 characters" required minlength="8">
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" required>
        <div class="error-text">Passwords do not match.</div>
      </div>

      <div class="form-group">
        <label for="location">Location</label>
        <input type="text" id="location" name="location" placeholder="City, State" required>
        <div class="hint">Used to suggest nearby specialists.</div>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
  </div>
</div>

</body>
</html>
