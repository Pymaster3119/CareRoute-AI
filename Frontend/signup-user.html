<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Your Account — CareRoute AI</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <a href="index.html" class="logo">💙 CareRoute AI</a>
  <nav class="public-nav">
    <a href="index.html">Home</a>
    <a href="login.html">Log In</a>
  </nav>
</header>

<div class="auth-wrap">
  <div class="card">

    <div class="role-toggle">
      <a href="signup-user.html" class="active">I'm a Patient</a>
      <a href="signup-doctor.html">I'm a Doctor</a>
    </div>

    <h1 class="page-title">Create your account</h1>
    <p class="page-subtitle">Upload your medical documents and get plain-language guidance.</p>

    <div id="signupStatus" class="error-text" style="display:none; margin-bottom:16px;"></div>

    <!-- Wire this form up to POST /addUser (fields: username, email, password, location) -->
    <form id="userSignupForm" action="#" method="POST">

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="e.g. jordan_m" required>
      </div>

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
        <div class="error-text">Please enter a valid email address.</div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="At least 8 characters" required minlength="8">
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" required>
        <div class="error-text">Passwords do not match.</div>
      </div>

      <div class="form-group">
        <label for="location">Location</label>
        <input type="text" id="location" name="location" placeholder="City, State" required>
        <div class="hint">Used to suggest nearby specialists.</div>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
  </div>
</div>

<script src="auth-state.js"></script>
<script>
  document.getElementById('userSignupForm').addEventListener('submit', async function (event) {
    event.preventDefault();

    const form = event.currentTarget;
    const signupStatus = document.getElementById('signupStatus');
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    const showStatus = (message) => {
      signupStatus.textContent = message;
      signupStatus.style.display = 'block';
    };

    signupStatus.textContent = '';
    signupStatus.style.display = 'none';

    if (password !== confirmPassword) {
      showStatus('Passwords do not match.');
      return;
    }

    try {
      const response = await fetch('http://127.0.0.1:5000/addUser', {
        method: 'POST',
        body: new FormData(form),
      });

      let payload = null;
      try {
        payload = await response.json();
      } catch (parseError) {
        payload = null;
      }

      if (response.ok) {
        CareRouteAuth.setAuthState('patient', document.getElementById('username').value, password);
        window.location.href = 'dashboard.html';
        return;
      }

      if (response.status === 400) {
        showStatus('User already exists. Maybe you meant to log in instead?');
        return;
      }

      showStatus((payload && payload.message) || `Signup failed with status ${response.status}. Please try again.`);
    } catch (error) {
      console.error('Signup request failed:', error);
      showStatus('The backend is reachable only if it allows browser requests from this page. This looks like a CORS/origin block, not a missing server.');
    }
  });
</script>

</body>
</html>
